#!/bin/bash

# Service startup order
declare -a SERVICE_ORDER=(
    "LEAF"
    "USER"
    "RBAC"
    "AUTH"
    "PRODUCT"
    "ORDER"
    "PAYMENT"
    "SEARCH"
    "BIZ"
    "MULTISHOP"
    "PLATFORM"
    "GATEWAY"
)

# Format: service_key=jar_name:port:jvm_opts
declare -A SERVICES=(
    ["LEAF"]="mall4cloud-leaf:9100:-Xms256m -Xmx512m -Xmn128m"
    ["USER"]="mall4cloud-user:9105:-Xms256m -Xmx512m -Xmn128m"
    ["RBAC"]="mall4cloud-rbac:9102:-Xms256m -Xmx512m -Xmn128m"
    ["AUTH"]="mall4cloud-auth:9101:-Xms256m -Xmx512m -Xmn128m"
    ["PRODUCT"]="mall4cloud-product:9104:-Xms256m -Xmx512m -Xmn128m"
    ["ORDER"]="mall4cloud-order:9106:-Xms512m -Xmx1024m -Xmn256m"
    ["PAYMENT"]="mall4cloud-payment:9113:-Xms256m -Xmx512m -Xmn128m"
    ["SEARCH"]="mall4cloud-search:9108:-Xms512m -Xmx1024m -Xmn256m"
    ["BIZ"]="mall4cloud-biz:9109:-Xms256m -Xmx512m -Xmn128m"
    ["MULTISHOP"]="mall4cloud-multishop:9103:-Xms256m -Xmx512m -Xmn128m"
    ["PLATFORM"]="mall4cloud-platform:9112:-Xms256m -Xmx512m -Xmn128m"
    ["GATEWAY"]="mall4cloud-gateway:8000:-Xms256m -Xmx512m -Xmn128m"
)

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
PROJECT_DIR="$(dirname "${SCRIPT_DIR}")"

JAR_DIRS=(
    "${SCRIPT_DIR}"
    "${SCRIPT_DIR}/apps"
    "${PROJECT_DIR}"
    "${PROJECT_DIR}/apps"
)

LOG_DIR="${SCRIPT_DIR}/logs"
PID_DIR="${SCRIPT_DIR}/pids"

START_TIMEOUT=60
STOP_TIMEOUT=30

LOG_MAX_SIZE="100M"
LOG_MAX_DAYS=7

NACOS_NAMESPACE="${NACOS_NAMESPACE:-prod}"
NACOS_HOST="${NACOS_HOST:-127.0.0.1}"
export NACOS_NAMESPACE
export NACOS_HOST

JAVA_OPTS="-server -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=${LOG_DIR}/heapdump.hprof -DNACOS_NAMESPACE=${NACOS_NAMESPACE} -DNACOS_HOST=${NACOS_HOST}"
