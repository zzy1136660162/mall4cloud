<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar -->

<!-- Main Canvas -->
<main class="flex-1 mb-20 md:mb-0 px-gutter w-full max-w-7xl mx-auto flex items-center justify-center py-section-margin relative overflow-hidden">
<!-- Ambient decorative blur for tech feel -->
<div class="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-secondary-container/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<!-- Search Form Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-section-margin flex flex-col relative z-10 backdrop-blur-sm">
<div class="mb-section-margin text-center">
<h2 class="font-display-lg text-display-lg text-on-surface mb-stack-gap">进度追踪查询</h2>
<p class="font-body-md text-body-md text-on-surface-variant">输入立项手机号及需求编号，实时获取转化节点状态。</p>
</div>
<form class="flex flex-col gap-section-margin" onsubmit="event.preventDefault();">
<!-- Phone Input -->
<div class="flex flex-col gap-base group">
<label class="font-body-md text-body-md text-on-surface-variant group-focus-within:text-primary transition-colors" for="phone-input">联系手机号</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-stack-gap text-outline-variant group-focus-within:text-primary transition-colors text-[20px]">smartphone</span>
<input autocomplete="tel" class="w-full bg-surface-bright border border-outline-variant rounded-lg pl-12 pr-stack-gap py-3 font-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container/50 transition-all shadow-sm" id="phone-input" placeholder="请输入11位手机号码" type="tel">
</div>
</div>
<!-- Requirement ID Input -->
<div class="flex flex-col gap-base group">
<div class="flex justify-between items-center">
<label class="font-body-md text-body-md text-on-surface-variant group-focus-within:text-primary transition-colors" for="id-input">需求编号</label>
<span class="font-label-sm text-label-sm text-outline">SR-XXX格式</span>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-stack-gap text-outline-variant group-focus-within:text-primary transition-colors text-[20px]">tag</span>
<input class="w-full bg-surface-bright border border-outline-variant rounded-lg pl-12 pr-stack-gap py-3 font-label-sm text-label-sm text-on-surface placeholder:text-outline placeholder:font-body-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container/50 transition-all shadow-sm uppercase" id="id-input" placeholder="例如: SR-202310-001" type="text">
</div>
</div>
<!-- Submit Button -->
<div class="mt-stack-gap">
<button class="w-full flex items-center justify-center gap-base bg-primary text-on-primary font-headline-md text-headline-md rounded-full py-3 hover:bg-primary-container shadow-sm hover:shadow-md transition-all active:scale-[0.98] duration-150" type="submit">
<span class="material-symbols-outlined text-[20px]">search</span>
                        立即查询
                    </button>
</div>
<div class="mt-section-margin text-center">
<a class="font-body-md text-body-md text-primary hover:text-primary-container transition-colors underline-offset-4 hover:underline" href="#">忘记编号？联系专属技术经理</a>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-surface-container rounded-t-xl border-t border-outline-variant shadow-lg">

<!-- Item 2: Inactive -->

</a>
<!-- Item 3: Active (查询) -->

<span class="material-symbols-outlined mb-base" data-icon="search" data-weight="fill" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-body-md text-body-md font-bold">查询</span>
</a>
<!-- Item 4: Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary active:scale-90 transition-transform duration-200 w-16 group" href="#">
<span class="material-symbols-outlined mb-base group-hover:bg-surface-variant rounded-full px-4 py-1 transition-colors" data-icon="person">person</span>
<span class="font-body-md text-body-md">我的</span>
</a>
</nav>
<script>
        // Simple input formatting/interaction logic
        document.addEventListener('DOMContentLoaded', () => {
            const idInput = document.getElementById('id-input');
            if(idInput) {
                idInput.addEventListener('input', function(e) {
                    // Auto uppercase for standard ID format feel
                    this.value = this.value.toUpperCase();
                });
            }
        });
    </script>
